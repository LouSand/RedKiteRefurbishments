name: Deploy website to one.com

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Deploy via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          username: ${{ secrets.ONECOM_USERNAME }}
          server: ${{ secrets.ONECOM_HOST }}
          port: 22
          local_path: "./*"
          remote_path: "/customers/8/b/5/cjqet5kb0/webroots/58cab8a7/"
          sftp_only: true
          password: ${{ secrets.ONECOM_PASSWORD }}